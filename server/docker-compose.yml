services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - MQTT_BROKER=mosquitto
      - LOG_DIR=/app/data
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      - mosquitto
    restart: unless-stopped

volumes:
  mosquitto_data:
