services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  dashboard:
    build: .
    environment:
      - MQTT_BROKER=mosquitto
      - LOG_DIR=/app/data
    volumes:
      - ./data:/app/data
    depends_on:
      - mosquitto
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - dashboard
    restart: unless-stopped

volumes:
  mosquitto_data:
