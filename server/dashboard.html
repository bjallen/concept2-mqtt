<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#08080c">
    <title>Concept2 Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #08080c;
            --surface: #0f0f16;
            --border: #1a1a26;
            --text: #e8e4df;
            --text-dim: #5a5670;
            --accent: #f0913a;
            --accent-glow: rgba(240, 145, 58, 0.15);
            --watts-color: #5eead4;
            --spm-color: #c4b5fd;
            --hr-color: #fca5a5;
            --positive: #34d399;
            --negative: #f87171;
        }

        html { font-size: 16px; -webkit-text-size-adjust: none; }

        body {
            font-family: 'Barlow', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* Subtle grain texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1000;
            opacity: 0.4;
        }

        .screen {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            padding: 1.25rem;
            max-width: 720px;
            margin: 0 auto;
        }

        .hidden { display: none !important; }

        /* ═══════════════════════════ WAITING STATE ═══════════════════════════ */

        #waiting {
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            background: radial-gradient(circle at 50% 40%, rgba(240, 145, 58, 0.02) 0%, transparent 60%);
        }

        .waiting-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            animation: spin 2s linear infinite;
            position: relative;
        }

        .waiting-ring::after {
            content: '';
            position: absolute;
            inset: 7px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-top-color: var(--accent);
            animation: spin 1.4s linear infinite reverse;
            opacity: 0.4;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .waiting-title {
            font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
        }

        .waiting-sub {
            font-size: 0.8rem;
            color: var(--text-dim);
            opacity: 0.5;
        }

        .waiting-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .dot.online {
            background: var(--positive);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.6);
        }

        .dot.live {
            animation: pulse-dot 2s ease infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Battery indicator */
        .battery {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .battery-icon {
            position: relative;
            width: 20px;
            height: 10px;
            border: 1.5px solid var(--text-dim);
            border-radius: 2px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 2px;
            width: 2px;
            height: 4px;
            background: var(--text-dim);
            border-radius: 0 1px 1px 0;
        }

        .battery-fill {
            position: absolute;
            left: 1px;
            top: 1px;
            bottom: 1px;
            border-radius: 1px;
            background: var(--text-dim);
            transition: width 0.3s, background 0.3s;
        }

        .battery.charging .battery-fill { background: var(--positive); }
        .battery.charging .battery-icon { border-color: var(--positive); }
        .battery.charging .battery-icon::after { background: var(--positive); }
        .battery.charging { color: var(--positive); }

        .battery.low .battery-fill { background: var(--negative); }
        .battery.low .battery-icon { border-color: var(--negative); }
        .battery.low .battery-icon::after { background: var(--negative); }
        .battery.low { color: var(--negative); }

        /* ═══════════════════════════ DASHBOARD ═══════════════════════════ */

        #dashboard {
            gap: 0;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }

        /* Header bar */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.5rem;
        }

        .dash-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dash-status-label {
            font-weight: 600;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--positive);
        }

        .elapsed {
            font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', Menlo, monospace;
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--text-dim);
            letter-spacing: 0.03em;
        }

        /* Hero pace */
        .hero {
            text-align: center;
            padding: 1.25rem 0 0.75rem;
        }

        .pace-value {
            font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif;
            font-size: clamp(5rem, 20vw, 11rem);
            line-height: 0.85;
            color: var(--accent);
            text-shadow: 0 0 60px var(--accent-glow), 0 0 120px rgba(240, 145, 58, 0.04);
            transition: color 0.25s ease;
            letter-spacing: 0.02em;
        }

        .pace-value.flash-pos { color: var(--positive); }
        .pace-value.flash-neg { color: var(--negative); }

        .pace-unit {
            font-family: 'Barlow', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 0.15rem;
        }

        /* Metrics grid */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin: 0.6rem 0;
        }

        .metric {
            background: var(--surface);
            padding: 0.7rem 0.4rem;
            text-align: center;
        }

        .metric-val {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 1.55rem;
            font-weight: 700;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            transition: transform 0.12s ease;
        }

        .metric-val.bump { transform: scale(1.06); }

        .metric-lbl {
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 0.2rem;
        }

        /* Primary metrics — colored */
        .m-watts .metric-val { color: var(--watts-color); }
        .m-watts .metric-lbl { color: color-mix(in srgb, var(--watts-color) 50%, transparent); }

        .m-spm .metric-val { color: var(--spm-color); }
        .m-spm .metric-lbl { color: color-mix(in srgb, var(--spm-color) 50%, transparent); }

        .m-hr .metric-val { color: var(--hr-color); }
        .m-hr .metric-lbl { color: color-mix(in srgb, var(--hr-color) 50%, transparent); }

        /* Heartbeat pulse for HR */
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            12% { transform: scale(1.1); }
            28% { transform: scale(1); }
        }
        .m-hr .metric-val.beat { animation: heartbeat 0.35s ease; }

        /* Chart */
        .chart-wrap {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.65rem 0.75rem;
            margin: 0.4rem 0;
            flex: 1;
            min-height: 110px;
            display: flex;
            flex-direction: column;
        }

        .chart-head {
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
            flex-shrink: 0;
        }

        .chart-body {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .chart-canvas {
            position: absolute;
            inset: 0;
        }

        /* Event banner */
        .event-banner {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 0.9rem 1rem;
            text-align: center;
            font-family: 'Bebas Neue', Impact, sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.2em;
            z-index: 500;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .event-banner.visible { transform: translateY(0); }

        .event-banner.ev-start {
            background: linear-gradient(180deg, rgba(52, 211, 153, 0.12) 0%, transparent 100%);
            color: var(--positive);
            border-bottom: 1px solid rgba(52, 211, 153, 0.15);
        }

        .event-banner.ev-end {
            background: linear-gradient(180deg, rgba(248, 113, 113, 0.12) 0%, transparent 100%);
            color: var(--negative);
            border-bottom: 1px solid rgba(248, 113, 113, 0.15);
        }

        /* Entrance animations */
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #dashboard.entering .hero { animation: slide-up 0.45s ease both; }
        #dashboard.entering .metrics-row:first-of-type { animation: slide-up 0.45s ease 0.08s both; }
        #dashboard.entering .chart-wrap { animation: slide-up 0.45s ease 0.16s both; }
        #dashboard.entering .metrics-row:last-of-type { animation: slide-up 0.45s ease 0.24s both; }

        /* Responsive */
        @media (max-width: 480px) {
            .screen { padding: 0.9rem; }
            .pace-value { font-size: clamp(4.2rem, 22vw, 7rem); }
            .metric-val { font-size: 1.3rem; }
            .metric { padding: 0.55rem 0.3rem; }
            .chart-wrap { min-height: 90px; }
        }

        @media (min-width: 1024px) {
            .screen { max-width: 800px; }
            .metric-val { font-size: 1.75rem; }
            .metric { padding: 0.9rem 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="event-banner" id="eventBanner"></div>

    <!-- Waiting / idle screen -->
    <div id="waiting" class="screen">
        <div class="waiting-ring"></div>
        <div class="waiting-title">WAITING FOR ERG</div>
        <div class="waiting-sub">Connect the PM5 and start rowing</div>
        <div class="waiting-status">
            <span class="dot" id="wDot"></span>
            <span id="wStatus">Connecting&hellip;</span>
        </div>
        <div class="battery hidden" id="wBattery">
            <div class="battery-icon"><div class="battery-fill" id="wBatteryFill"></div></div>
            <span id="wBatteryPct"></span>
        </div>
        <a href="/" style="margin-top:1.5rem;font-size:0.75rem;color:var(--text-dim);opacity:0.6;text-decoration:none;letter-spacing:0.1em;">VIEW HISTORY</a>
    </div>

    <!-- Live dashboard -->
    <div id="dashboard" class="screen hidden">
        <div class="dash-header">
            <div class="dash-status">
                <span class="dot online live"></span>
                <span class="dash-status-label">Live</span>
            </div>
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <div class="battery hidden" id="dBattery">
                    <div class="battery-icon"><div class="battery-fill" id="dBatteryFill"></div></div>
                    <span id="dBatteryPct"></span>
                </div>
                <div class="elapsed" id="elapsed">0:00</div>
            </div>
        </div>

        <div class="hero">
            <div class="pace-value" id="pace">-:--</div>
            <div class="pace-unit">/500m</div>
        </div>

        <div class="metrics-row">
            <div class="metric m-watts">
                <div class="metric-val" id="watts">&mdash;</div>
                <div class="metric-lbl">Watts</div>
            </div>
            <div class="metric m-spm">
                <div class="metric-val" id="spm">&mdash;</div>
                <div class="metric-lbl">Strokes/min</div>
            </div>
            <div class="metric m-hr">
                <div class="metric-val" id="hr">&mdash;</div>
                <div class="metric-lbl">Heart Rate</div>
            </div>
        </div>

        <div class="chart-wrap">
            <div class="chart-head">Pace Trend</div>
            <div class="chart-body">
                <canvas id="chart" class="chart-canvas"></canvas>
            </div>
        </div>

        <div class="metrics-row">
            <div class="metric">
                <div class="metric-val" id="distance">0</div>
                <div class="metric-lbl">Meters</div>
            </div>
            <div class="metric">
                <div class="metric-val" id="calories">0</div>
                <div class="metric-lbl">Calories</div>
            </div>
            <div class="metric">
                <div class="metric-val" id="calhr">0</div>
                <div class="metric-lbl">Cal/hr</div>
            </div>
        </div>
    </div>

    <script>
    (() => {
        /* ── State ── */
        const CHART_MAX = 60;
        const IDLE_MS = 6000;

        const S = {
            wsConnected: false,
            ergOnline: false,
            active: false,
            lastStroke: 0,
            prevPace: 0,
            chart: [],
        };

        /* ── DOM ── */
        const $ = id => document.getElementById(id);
        const el = {
            waiting:  $('waiting'),
            dashboard: $('dashboard'),
            wDot:     $('wDot'),
            wStatus:  $('wStatus'),
            banner:   $('eventBanner'),
            pace:     $('pace'),
            elapsed:  $('elapsed'),
            watts:    $('watts'),
            spm:      $('spm'),
            hr:       $('hr'),
            distance: $('distance'),
            calories: $('calories'),
            calhr:    $('calhr'),
            chart:    $('chart'),
        };

        /* ── Battery ── */
        function updateBattery(data) {
            [['wBattery','wBatteryFill','wBatteryPct'], ['dBattery','dBatteryFill','dBatteryPct']].forEach(([wrap, fill, pct]) => {
                const wEl = $(wrap), fEl = $(fill), pEl = $(pct);
                wEl.classList.remove('hidden');
                const level = Math.max(0, Math.min(100, data.level));
                fEl.style.width = (level / 100 * (20 - 4)) + 'px';
                pEl.textContent = Math.round(level) + '%';
                wEl.classList.toggle('charging', !!data.charging);
                wEl.classList.toggle('low', level < 20 && !data.charging);
            });
        }

        /* ── Formatters ── */
        function fmtPace(s) {
            if (!s || s <= 0 || s > 600) return '-:--';
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return m + ':' + sec.toFixed(1).padStart(4, '0');
        }

        function fmtTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60);
            return h > 0
                ? h + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0')
                : m + ':' + String(sec).padStart(2, '0');
        }

        function fmtDist(m) { return Math.round(m).toLocaleString(); }

        /* ── UI helpers ── */
        function showScreen(name) {
            if (name === 'dashboard') {
                el.waiting.classList.add('hidden');
                el.dashboard.classList.remove('hidden');
                el.dashboard.classList.add('entering');
                setTimeout(() => el.dashboard.classList.remove('entering'), 600);
            } else {
                el.dashboard.classList.add('hidden');
                el.waiting.classList.remove('hidden');
                S.active = false;
            }
        }

        function setMetric(node, val) {
            const str = String(val);
            if (node.textContent !== str) {
                node.textContent = str;
                node.classList.remove('bump');
                void node.offsetWidth;
                node.classList.add('bump');
                setTimeout(() => node.classList.remove('bump'), 140);
            }
        }

        function flashBanner(type) {
            const b = el.banner;
            b.className = 'event-banner ev-' + type;
            b.textContent = type === 'start' ? 'WORKOUT STARTED' : 'WORKOUT COMPLETE';
            requestAnimationFrame(() => {
                b.classList.add('visible');
                setTimeout(() => b.classList.remove('visible'), 2800);
            });
        }

        function flashPace(dir) {
            const cls = dir === 'fast' ? 'flash-pos' : 'flash-neg';
            el.pace.classList.add(cls);
            setTimeout(() => el.pace.classList.remove(cls), 280);
        }

        function beatHR() {
            const v = el.hr;
            v.classList.remove('beat');
            void v.offsetWidth;
            v.classList.add('beat');
        }

        /* ── Chart ── */
        function drawChart() {
            const canvas = el.chart;
            const container = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            const w = container.clientWidth;
            const h = container.clientHeight;

            if (w === 0 || h === 0) return;

            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';

            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, w, h);

            const data = S.chart;
            const valid = data.filter(p => p > 0 && p < 600);
            if (valid.length < 2) return;

            const lo = Math.min(...valid);
            const hi = Math.max(...valid);
            const pad = Math.max((hi - lo) * 0.2, 3);
            const yMin = lo - pad;
            const yMax = hi + pad;

            // Subtle grid
            ctx.strokeStyle = 'rgba(255,255,255,0.035)';
            ctx.lineWidth = 1;
            for (let i = 1; i < 4; i++) {
                const gy = (i / 4) * h;
                ctx.beginPath();
                ctx.moveTo(0, gy);
                ctx.lineTo(w, gy);
                ctx.stroke();
            }

            // Points
            const pts = data.map((p, i) => ({
                x: (i / (CHART_MAX - 1)) * w,
                y: ((p - yMin) / (yMax - yMin)) * h,
            }));

            // Area fill
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                const cpx = (pts[i - 1].x + pts[i].x) / 2;
                ctx.bezierCurveTo(cpx, pts[i - 1].y, cpx, pts[i].y, pts[i].x, pts[i].y);
            }
            ctx.lineTo(pts[pts.length - 1].x, h);
            ctx.lineTo(pts[0].x, h);
            ctx.closePath();

            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, 'rgba(240, 145, 58, 0.10)');
            grad.addColorStop(1, 'rgba(240, 145, 58, 0.005)');
            ctx.fillStyle = grad;
            ctx.fill();

            // Glow line
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                const cpx = (pts[i - 1].x + pts[i].x) / 2;
                ctx.bezierCurveTo(cpx, pts[i - 1].y, cpx, pts[i].y, pts[i].x, pts[i].y);
            }
            ctx.shadowBlur = 14;
            ctx.shadowColor = 'rgba(240, 145, 58, 0.45)';
            ctx.strokeStyle = '#f0913a';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Crisp line
            ctx.shadowBlur = 0;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // End dot
            const last = pts[pts.length - 1];
            ctx.beginPath();
            ctx.arc(last.x, last.y, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = '#f0913a';
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(240, 145, 58, 0.7)';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Left-edge fade
            const fg = ctx.createLinearGradient(0, 0, 32, 0);
            fg.addColorStop(0, '#0f0f16');
            fg.addColorStop(1, 'rgba(15, 15, 22, 0)');
            ctx.fillStyle = fg;
            ctx.fillRect(0, 0, 32, h);
        }

        /* ── WebSocket ── */
        let ws = null;
        let reconnectDelay = 1000;

        function connect() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(proto + '//' + location.host + '/ws');

            ws.onopen = () => {
                S.wsConnected = true;
                reconnectDelay = 1000;
                el.wDot.classList.add('online');
                el.wStatus.textContent = 'Connected \u2014 waiting for workout';
            };

            ws.onclose = () => {
                S.wsConnected = false;
                el.wDot.classList.remove('online');
                el.wStatus.textContent = 'Reconnecting\u2026';
                setTimeout(connect, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 1.5, 8000);
            };

            ws.onerror = () => ws.close();

            ws.onmessage = (e) => {
                let msg;
                try { msg = JSON.parse(e.data); } catch { return; }

                /* Battery */
                if (msg.topic === 'concept2/battery') {
                    updateBattery(msg.payload);
                    return;
                }

                /* Status */
                if (msg.topic === 'concept2/status') {
                    S.ergOnline = msg.payload === 'online';
                    if (S.ergOnline) {
                        el.wDot.classList.add('online');
                        el.wStatus.textContent = 'Erg online \u2014 waiting for workout';
                    } else {
                        el.wDot.classList.remove('online');
                        el.wStatus.textContent = 'Erg offline';
                    }
                    return;
                }

                /* Events */
                if (msg.topic === 'concept2/event') {
                    const ev = msg.payload && msg.payload.event;
                    if (ev === 'workout_start') {
                        S.active = true;
                        S.chart = [];
                        S.prevPace = 0;
                        flashBanner('start');
                        showScreen('dashboard');
                    } else if (ev === 'workout_end') {
                        flashBanner('end');
                        setTimeout(() => { if (!S.active) showScreen('waiting'); }, 8000);
                        S.active = false;
                    }
                    return;
                }

                /* Stroke data */
                if (msg.topic === 'concept2/stroke') {
                    const d = msg.payload;
                    S.lastStroke = Date.now();

                    if (!S.active) {
                        S.active = true;
                        S.chart = [];
                        S.prevPace = 0;
                        showScreen('dashboard');
                    }

                    // Pace
                    const ps = fmtPace(d.pace_secs);
                    if (el.pace.textContent !== ps) {
                        el.pace.textContent = ps;
                        if (S.prevPace > 0 && d.pace_secs > 0) {
                            if (d.pace_secs < S.prevPace - 0.8) flashPace('fast');
                            else if (d.pace_secs > S.prevPace + 0.8) flashPace('slow');
                        }
                        S.prevPace = d.pace_secs;
                    }

                    // Metrics
                    setMetric(el.elapsed, fmtTime(d.elapsed_secs));
                    setMetric(el.watts, d.watts > 0 ? d.watts : '\u2014');
                    setMetric(el.spm, d.stroke_rate > 0 ? d.stroke_rate : '\u2014');
                    setMetric(el.distance, fmtDist(d.distance_m));
                    setMetric(el.calories, d.calories);
                    setMetric(el.calhr, d.cal_per_hr || 0);

                    // Heart rate with beat animation
                    const hrVal = d.heart_rate > 0 ? d.heart_rate : '\u2014';
                    setMetric(el.hr, hrVal);
                    if (d.heart_rate > 0) beatHR();

                    // Chart
                    S.chart.push(d.pace_secs);
                    if (S.chart.length > CHART_MAX) S.chart.shift();
                    drawChart();
                }
            };
        }

        /* ── Idle check ── */
        setInterval(() => {
            if (S.active && Date.now() - S.lastStroke > IDLE_MS) {
                S.active = false;
                showScreen('waiting');
            }
        }, 1000);

        /* ── Resize ── */
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(drawChart, 80);
        });

        /* ── Go ── */
        connect();
    })();
    </script>
</body>
</html>
